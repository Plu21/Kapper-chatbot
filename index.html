<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stijlvol Knippen — Chatbot Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.page-title{font-size:13px;color:#888;margin-bottom:12px;letter-spacing:1px;text-transform:uppercase}
.wrap{width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.15);background:#fff}
.chat-header{background:#1a1a1a;padding:14px 16px;display:flex;align-items:center;gap:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:#c8a96e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-name{color:#fff;font-weight:600;font-size:15px}
.header-status{color:#7fe07f;font-size:11px;display:flex;align-items:center;gap:4px;margin-top:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#7fe07f;display:inline-block}
.messages{height:360px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f7f7f7}
.msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;white-space:pre-line}
.msg.bot{background:#fff;border:1px solid #e8e8e8;color:#1a1a1a;border-radius:4px 16px 16px 16px;align-self:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.msg.user{background:#1a1a1a;color:#fff;border-radius:16px 4px 16px 16px;align-self:flex-end}
.msg.typing{display:flex;gap:4px;align-items:center;padding:12px 16px}
.dot{width:7px;height:7px;border-radius:50%;background:#bbb;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.booking-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;align-self:flex-start;width:100%;max-width:290px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.booking-title{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:10px}
.step-label{font-size:11px;color:#888;margin-bottom:5px;font-weight:500}
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.service-btn{padding:7px 8px;border-radius:8px;border:1px solid #e0e0e0;background:#f7f7f7;color:#1a1a1a;font-size:11px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.3}
.service-btn:hover,.service-btn.sel{background:#e8f0ff;border-color:#4a7eff;color:#1a4aaa}
.day-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.day-btn{padding:5px 9px;border-radius:8px;border:1px solid #e0e0e0;background:#f7f7f7;color:#1a1a1a;font-size:11px;cursor:pointer;transition:all .15s}
.day-btn:hover,.day-btn.sel{background:#e8f0ff;border-color:#4a7eff;color:#1a4aaa}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.time-btn{padding:5px;border-radius:8px;border:1px solid #e0e0e0;background:#f7f7f7;color:#1a1a1a;font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
.time-btn:hover,.time-btn.sel{background:#e8ffe8;border-color:#2d8a2d;color:#1a5a1a}
.confirm-btn{width:100%;padding:9px;border-radius:8px;background:#1a1a1a;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .15s}
.confirm-btn:hover{opacity:.85}
.confirm-btn:disabled{background:#e0e0e0;color:#aaa;cursor:default}
.summary-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.summary-row:last-of-type{border:none}
.summary-label{color:#888}.summary-val{color:#1a1a1a;font-weight:600}
.quick-btns{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid #f0f0f0;background:#fff}
.qbtn{padding:6px 12px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:#555;font-size:12px;cursor:pointer;transition:all .15s}
.qbtn:hover{background:#f0f0f0;color:#1a1a1a}
.input-row{padding:10px 14px;display:flex;gap:8px;border-top:1px solid #f0f0f0;background:#fff}
.chat-input{flex:1;padding:9px 14px;border-radius:22px;border:1px solid #e0e0e0;background:#f7f7f7;color:#1a1a1a;font-size:13px;outline:none;transition:border .15s}
.chat-input:focus{border-color:#aaa;background:#fff}
.send-btn{width:36px;height:36px;border-radius:50%;background:#1a1a1a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:hover{opacity:.8}
.send-arrow{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:10px solid #fff;margin-left:2px}
.branding{text-align:center;padding:8px;font-size:10px;color:#bbb;background:#fff;border-top:1px solid #f0f0f0}
</style>
</head>
<body>
<p class="page-title">✂ Demo chatbot — kapper</p>
<div class="wrap">
  <div class="chat-header">
    <div class="avatar">✂</div>
    <div>
      <div class="header-name">Stijlvol Knippen</div>
      <div class="header-status"><span class="status-dot"></span> Online — altijd bereikbaar</div>
    </div>
  </div>
  <div class="messages" id="msgs">
    <div class="msg bot">Hallo! Welkom bij Stijlvol Knippen ✂️ Waarmee kan ik je helpen?</div>
  </div>
  <div class="quick-btns" id="quickBtns">
    <button class="qbtn" onclick="sendQ('Afspraak maken')">📅 Afspraak maken</button>
    <button class="qbtn" onclick="sendQ('Wat zijn de prijzen?')">💰 Prijzen</button>
    <button class="qbtn" onclick="sendQ('Openingstijden')">🕐 Openingstijden</button>
    <button class="qbtn" onclick="sendQ('Waar zijn jullie?')">📍 Locatie</button>
  </div>
  <div class="input-row">
    <input class="chat-input" id="inp" placeholder="Stel een vraag..." onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="send-btn" onclick="sendMsg()"><div class="send-arrow"></div></button>
  </div>
  <div class="branding">Powered by AI · gebouwd door [jouw naam] · info@jouwbedrijf.nl</div>
</div>

<script>
const SERVICES=[
  {name:'Heren knippen',price:'€20',dur:'20 min'},
  {name:'Dames knippen',price:'€35',dur:'45 min'},
  {name:'Kinderknippen',price:'€15',dur:'20 min'},
  {name:'Baard trimmen',price:'€12',dur:'15 min'},
  {name:'Heren + baard',price:'€28',dur:'35 min'},
  {name:'Verven',price:'€55',dur:'60 min'},
];
const DAYS=['Ma 31 mrt','Di 1 apr','Wo 2 apr','Do 3 apr','Vr 4 apr','Za 5 apr'];
const TIMES=['09:00','09:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30'];
const KB={
  open:{k:['open','tijden','uur','wanneer','maandag','zaterdag','zondag','gesloten'],a:'Onze openingstijden:\n\nDi t/m vr: 09:00 – 18:00\nZaterdag: 09:00 – 17:00\n\nMaandag en zondag zijn we gesloten.'},
  prijs:{k:['prijs','kost','euro','hoeveel','tarief','goedkoop'],a:'Onze tarieven:\n\nHeren knippen — €20\nDames knippen — €35\nKinderknippen — €15\nBaard trimmen — €12\nHeren + baard — €28\nVerven — €55\nHighlights — €75'},
  loc:{k:['waar','adres','locatie','parkeer','route','rijden'],a:'Je vindt ons op:\n\nVoorbeeldstraat 12, Rotterdam\n\nGratis parkeren in de straat. Dichtstbijzijnde parkeergarage is 5 min lopen.'},
  team:{k:['wie','kapper','ahmed','lisa','kevin','team','medewerker'],a:'Ons team:\n\nAhmed — specialist herenknippen & fade\nLisa — specialist dames & kleur\nKevin — allround stylist\n\nVoorkeur? Geef het aan bij je afspraak!'},
  duur:{k:['lang','duur','tijd','minuten','wacht'],a:'Een knipbeurt duurt gemiddeld:\n\nHeren: 20–30 minuten\nDames: 45–60 minuten\nKinderen: 20 minuten'},
  betalen:{k:['pin','contant','betaal','cash','ideal'],a:'We accepteren pin en contant. Geen creditcard of iDeal helaas.'},
  foto:{k:['foto','plaatje','voorbeeld','inspiratie'],a:'Absoluut! We raden het zelfs aan om een foto mee te nemen. Dan weten we precies wat je wilt.'},
};
let booking={service:null,day:null,time:null,step:0};
function msgs(){return document.getElementById('msgs')}
function addMsg(text,who){
  const d=document.createElement('div');
  d.className='msg '+who;d.textContent=text;
  msgs().appendChild(d);msgs().scrollTop=msgs().scrollHeight;
}
function showTyping(){
  const d=document.createElement('div');
  d.className='msg bot typing';d.id='typing';
  d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs().appendChild(d);msgs().scrollTop=msgs().scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function showBookingCard(){
  removeTyping();
  const d=document.createElement('div');
  d.id='bookingCard';d.innerHTML=renderCard();
  msgs().appendChild(d);msgs().scrollTop=msgs().scrollHeight;
}
function updateCard(){
  const c=document.getElementById('bookingCard');
  if(c){c.innerHTML=renderCard();msgs().scrollTop=msgs().scrollHeight;}
}
function renderCard(){
  if(booking.step===0){
    return`<div class="booking-card"><div class="booking-title">Afspraak maken — stap 1/3</div>
    <div class="step-label">Kies een dienst</div>
    <div class="service-grid">${SERVICES.map((s,i)=>`<button class="service-btn${booking.service===i?' sel':''}" onclick="selectService(${i})">${s.name}<br><span style="color:#aaa;font-size:10px">${s.price} · ${s.dur}</span></button>`).join('')}</div>
    <button class="confirm-btn"${booking.service===null?' disabled':''} onclick="nextStep()">Volgende →</button></div>`;
  }
  if(booking.step===1){
    return`<div class="booking-card"><div class="booking-title">Afspraak maken — stap 2/3</div>
    <div class="step-label">Kies een dag</div>
    <div class="day-grid">${DAYS.map((d,i)=>`<button class="day-btn${booking.day===i?' sel':''}" onclick="selectDay(${i})">${d}</button>`).join('')}</div>
    <div class="step-label">Kies een tijd</div>
    <div class="time-grid">${TIMES.map((t,i)=>`<button class="time-btn${booking.time===i?' sel':''}" onclick="selectTime(${i})">${t}</button>`).join('')}</div>
    <button class="confirm-btn"${(booking.day===null||booking.time===null)?' disabled':''} onclick="nextStep()">Bevestigen →</button></div>`;
  }
  if(booking.step===2){
    const s=SERVICES[booking.service];
    return`<div class="booking-card"><div class="booking-title">✅ Afspraak bevestigd!</div>
    <div class="summary-row"><span class="summary-label">Dienst</span><span class="summary-val">${s.name}</span></div>
    <div class="summary-row"><span class="summary-label">Prijs</span><span class="summary-val">${s.price}</span></div>
    <div class="summary-row"><span class="summary-label">Dag</span><span class="summary-val">${DAYS[booking.day]}</span></div>
    <div class="summary-row"><span class="summary-label">Tijd</span><span class="summary-val">${TIMES[booking.time]}</span></div>
    <div class="summary-row"><span class="summary-label">Duur</span><span class="summary-val">${s.dur}</span></div>
    <button class="confirm-btn" onclick="newBooking()" style="background:#f0f0f0;color:#555;margin-top:8px">Nieuwe afspraak</button></div>`;
  }
}
function selectService(i){booking.service=i;updateCard();}
function selectDay(i){booking.day=i;updateCard();}
function selectTime(i){booking.time=i;updateCard();}
function nextStep(){
  booking.step++;updateCard();
  if(booking.step===2)setTimeout(()=>addMsg('Super! Je afspraak is ingepland. Je ontvangt een bevestiging via WhatsApp op 06-12345678. Tot dan! ✂️','bot'),400);
}
function newBooking(){booking={service:null,day:null,time:null,step:0};updateCard();}
function getAnswer(q){
  const ql=q.toLowerCase();
  if(ql.includes('afspraak')||ql.includes('boek')||ql.includes('inplan')||ql.includes('reserv'))return null;
  for(const[,v]of Object.entries(KB)){if(v.k.some(k=>ql.includes(k)))return v.a;}
  return 'Goede vraag! Bel ons op 010-1234567 of stuur een WhatsApp naar 06-12345678. We helpen je graag!';
}
function sendQ(text){
  document.getElementById('quickBtns').style.display='none';
  addMsg(text,'user');
  const ans=getAnswer(text);
  if(ans===null){showTyping();setTimeout(()=>{removeTyping();addMsg('Natuurlijk! Kies hieronder je dienst, dag en tijd.','bot');booking={service:null,day:null,time:null,step:0};showBookingCard();},800);}
  else{showTyping();setTimeout(()=>{removeTyping();addMsg(ans,'bot');},800);}
}
function sendMsg(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  document.getElementById('quickBtns').style.display='none';
  addMsg(txt,'user');
  const ans=getAnswer(txt);
  if(ans===null){showTyping();setTimeout(()=>{removeTyping();addMsg('Natuurlijk! Kies hieronder je dienst, dag en tijd.','bot');booking={service:null,day:null,time:null,step:0};showBookingCard();},800);}
  else{showTyping();setTimeout(()=>{removeTyping();addMsg(ans,'bot');},700+Math.random()*300);}
}
</script>
</body>
</html>
